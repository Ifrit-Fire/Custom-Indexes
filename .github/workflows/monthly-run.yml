name: Monthly Index Build

on:
  schedule:
    - cron: '0 0 1 * *'  # Runs at midnight UTC on the 1st of every month
  workflow_dispatch:       # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CMC_API_TOKEN: ${{ secrets.CMC_API_TOKEN }}
      FINN_API_TOKEN: ${{ secrets.FINN_API_TOKEN }}
      FMP_API_TOKEN: ${{ secrets.FMP_API_TOKEN }}
      FRED_API_TOKEN: ${{ secrets.FRED_API_TOKEN }}
      POLY_API_TOKEN: ${{ secrets.POLY_API_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt

      - name: Run index builder
        run: python -m src.main

      - name: Commit updated indexes
        if: github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add indexes/
          git diff --cached --quiet || git commit -m "chore: update indexes [$(date -u +'%Y-%m-%d')]"
          git push
